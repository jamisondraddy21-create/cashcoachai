<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CashCoachAI — Create Your Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    .auth-page  { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 16px; }
    .auth-card  { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 440px; box-shadow: var(--shadow-md); }
    .auth-brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .auth-logo  { font-size: 28px; }
    .auth-name  { font-size: 1.3rem; font-weight: 800; color: var(--text); }
    .auth-name .accent { color: var(--green); }
    .auth-title { font-size: 1.4rem; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 6px; }
    .auth-sub   { font-size: 0.9rem; color: var(--text-2); text-align: center; margin-bottom: 28px; line-height: 1.5; }
    .auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .auth-label { font-size: 13px; font-weight: 600; color: var(--text-2); }
    .auth-error { background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.3); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #dc2626; margin-bottom: 16px; display: none; }
    .auth-email-box { background: var(--surface-2); border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text); text-align: center; margin-bottom: 20px; }
    .trial-badge-sm { display: block; background: rgba(5,150,105,.12); color: var(--green); font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
    /* Eye toggle wrapper */
    .pw-wrap { position: relative; }
    .pw-wrap .input-field { width: 100%; padding-right: 42px; box-sizing: border-box; }
    .pw-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--text-2); display: flex; align-items: center;
    }
    .pw-eye:hover { color: var(--text); }
    .pw-eye svg { width: 18px; height: 18px; }
  </style>
</head>
<body class="sub-body">
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <span class="auth-logo">💰</span>
      <span class="auth-name">CashCoach<span class="accent">AI</span></span>
    </div>

    <div class="trial-badge-sm">🎉 Payment successful — your 7-day free trial has started!</div>

    <h1 class="auth-title">Create your password</h1>
    <p class="auth-sub">Set a password so you can log back in any time and access your saved financial data.</p>

    {% if email %}
    <div class="auth-email-box">📧 {{ email }}</div>
    {% endif %}

    <div class="auth-error" id="pwError"></div>

    <div class="auth-field">
      <label class="auth-label">Choose a password</label>
      <div class="pw-wrap">
        <input type="password" id="pwInput" class="input-field" placeholder="At least 8 characters" onkeydown="handleKey(event)" />
        <button class="pw-eye" type="button" onclick="toggleEye('pwInput', this)" aria-label="Show password">
          <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Confirm your password</label>
      <div class="pw-wrap">
        <input type="password" id="pwConfirm" class="input-field" placeholder="Repeat your password" onkeydown="handleKey(event)" />
        <button class="pw-eye" type="button" onclick="toggleEye('pwConfirm', this)" aria-label="Show password">
          <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="pwBtn" onclick="setPassword()" style="width:100%;margin-top:8px">
      Create Password & Continue →
    </button>

  </div>
</div>

<script>
const TOKEN = '{{ token }}';

function toggleEye(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  // Swap between eye-open and eye-slash SVG
  btn.innerHTML = isHidden
    ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.084-3.41M6.53 6.533A9.955 9.955 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411M3 3l18 18"/>
       </svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
       </svg>`;
}

async function setPassword() {
  const pw      = document.getElementById('pwInput').value;
  const confirm = document.getElementById('pwConfirm').value;
  const btn     = document.getElementById('pwBtn');
  const errEl   = document.getElementById('pwError');

  errEl.style.display = 'none';

  if (!pw || pw.length < 8) {
    errEl.textContent   = 'Password must be at least 8 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (pw !== confirm) {
    errEl.textContent   = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Saving…';

  try {
    const res  = await fetch('/api/set-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, password: pw }),
    });
    const data = await res.json();

    if (data.error) {
      errEl.textContent   = data.error;
      errEl.style.display = 'block';
      btn.disabled        = false;
      btn.textContent     = 'Create Password & Continue →';
      return;
    }

    // Clear any stale demo/local state then go to setup wizard
    localStorage.removeItem('cca_demo');
    localStorage.removeItem('cca_v1');
    window.location.href = '/setup?token=' + TOKEN;
  } catch (_) {
    errEl.textContent   = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.textContent     = 'Create Password & Continue →';
  }
}

function handleKey(e) {
  if (e.key === 'Enter') setPassword();
}
</script>
</body>
</html>
